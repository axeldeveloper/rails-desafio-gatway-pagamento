{
  "openapi": "3.0.1",
  "info": {
    "title": "Billing Gateway API",
    "version": "v1",
    "description": "Sistema Unificado de Cobrança - V1",
    "contact": {
      "name": "Billing Team",
      "email": "billing@company.com"
    }
  },
  "paths": {
    "/api/v1/auth/login": {
      "post": {
        "summary": "Login de usuário",
        "tags": [
          "Authentication"
        ],
        "parameters": [],
        "responses": {
          "200": {
            "description": "login successful"
          },
          "401": {
            "description": "invalid credentials"
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "email": {
                    "type": "string"
                  },
                  "password": {
                    "type": "string"
                  }
                },
                "required": [
                  "email",
                  "password"
                ]
              }
            }
          }
        }
      }
    },
    "/api/v1/auth/me": {
      "get": {
        "summary": "Obter informações do usuário atual",
        "tags": [
          "Authentication"
        ],
        "security": [
          {
            "Bearer": []
          }
        ],
        "responses": {
          "200": {
            "description": "user information"
          },
          "401": {
            "description": "not authenticated"
          }
        }
      }
    },
    "/api/v1/customers": {
      "get": {
        "summary": "Lista clientes",
        "tags": [
          "Customers"
        ],
        "security": [
          {
            "Bearer": []
          }
        ],
        "description": "Lista todos os clientes com paginação",
        "parameters": [
          {
            "name": "page",
            "in": "query",
            "description": "Número da página",
            "example": 1,
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "per_page",
            "in": "query",
            "description": "Itens por página",
            "example": 25,
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "search",
            "in": "query",
            "description": "Busca por nome ou email",
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Lista de clientes recuperada com sucesso",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "customers": {
                      "type": "array",
                      "items": {
                        "$ref": "#/components/schemas/Customer"
                      }
                    },
                    "meta": {
                      "type": "object",
                      "properties": {
                        "current_page": {
                          "type": "integer"
                        },
                        "total_pages": {
                          "type": "integer"
                        },
                        "total_count": {
                          "type": "integer"
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "401": {
            "description": "não autorizado",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      },
      "post": {
        "summary": "Criar cliente",
        "tags": [
          "Customers"
        ],
        "security": [
          {
            "Bearer": []
          }
        ],
        "description": "Cria um novo cliente",
        "parameters": [],
        "responses": {
          "201": {
            "description": "criado",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Customer"
                }
              }
            }
          },
          "401": {
            "description": "Não autorizado"
          },
          "422": {
            "description": "dados inválidos",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "name": {
                    "type": "string",
                    "example": "João Silva"
                  },
                  "email": {
                    "type": "string",
                    "example": "joao@email.com"
                  },
                  "document": {
                    "type": "string",
                    "example": "12345678901"
                  },
                  "phone": {
                    "type": "string",
                    "example": "11999999999"
                  }
                },
                "required": [
                  "name",
                  "email",
                  "document"
                ]
              }
            }
          }
        }
      }
    },
    "/api/v1/customers/{id}": {
      "parameters": [
        {
          "name": "id",
          "in": "path",
          "description": "ID do cliente",
          "required": true,
          "schema": {
            "type": "integer"
          }
        }
      ],
      "get": {
        "summary": "Mostrar cliente",
        "tags": [
          "Customers"
        ],
        "security": [
          {
            "Bearer": []
          }
        ],
        "responses": {
          "200": {
            "description": "sucesso",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Customer"
                }
              }
            }
          },
          "404": {
            "description": "não encontrado",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      },
      "put": {
        "summary": "Atualizar um cliente",
        "tags": [
          "Customers"
        ],
        "security": [
          {
            "Bearer": []
          }
        ],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "integer"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Cliente atualizado"
          },
          "401": {
            "description": "Não autorizado"
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "name": {
                    "type": "string"
                  },
                  "email": {
                    "type": "string"
                  },
                  "document": {
                    "type": "string"
                  },
                  "phone": {
                    "type": "string"
                  },
                  "address": {
                    "type": "string"
                  },
                  "number": {
                    "type": "string"
                  },
                  "city": {
                    "type": "string"
                  },
                  "state": {
                    "type": "string"
                  },
                  "zip_code": {
                    "type": "string"
                  },
                  "country": {
                    "type": "string"
                  }
                }
              }
            }
          }
        }
      },
      "delete": {
        "summary": "Excluir um cliente",
        "tags": [
          "Customers"
        ],
        "security": [
          {
            "Bearer": []
          }
        ],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "integer"
            }
          }
        ],
        "responses": {
          "204": {
            "description": "Cliente excluído"
          },
          "401": {
            "description": "Não autorizado"
          }
        }
      }
    }
  },
  "servers": [
    {
      "url": "http://{defaultHost}",
      "description": "Development server",
      "variables": {
        "protocol": {
          "default": "http"
        },
        "defaultHost": {
          "default": "localhost:3000"
        }
      }
    }
  ],
  "components": {
    "securitySchemes": {
      "Bearer": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "JWT",
        "description": "Token JWT obtido no login (Bearer token)"
      }
    },
    "schemas": {
      "Customer": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "example": 1
          },
          "name": {
            "type": "string",
            "example": "João Silva"
          },
          "email": {
            "type": "string",
            "example": "joao@email.com"
          },
          "document": {
            "type": "string",
            "example": "12345678901"
          },
          "phone": {
            "type": "string",
            "example": "11999999999"
          },
          "created_at": {
            "type": "string",
            "format": "date-time"
          },
          "updated_at": {
            "type": "string",
            "format": "date-time"
          }
        },
        "required": [
          "name",
          "email",
          "document"
        ]
      },
      "Product": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "example": 1
          },
          "name": {
            "type": "string",
            "example": "PMS Pro"
          },
          "code": {
            "type": "string",
            "example": "pms_pro"
          },
          "description": {
            "type": "string",
            "example": "Sistema de gestão hoteleira"
          },
          "status": {
            "type": "string",
            "enum": [
              "active",
              "inactive"
            ],
            "example": "active"
          }
        }
      },
      "Plan": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "example": 1
          },
          "name": {
            "type": "string",
            "example": "Plano Mensal PMS"
          },
          "amount_cents": {
            "type": "integer",
            "example": 9900
          },
          "billing_type": {
            "type": "string",
            "enum": [
              "recurring",
              "one_time"
            ]
          },
          "interval": {
            "type": "string",
            "enum": [
              "monthly",
              "quarterly",
              "yearly"
            ]
          },
          "product_id": {
            "type": "integer",
            "example": 1
          }
        }
      },
      "Subscription": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "example": 1
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "active",
              "cancelled",
              "expired"
            ]
          },
          "gateway_subscription_id": {
            "type": "string",
            "example": "sub_123abc"
          },
          "started_at": {
            "type": "string",
            "format": "date-time"
          },
          "ended_at": {
            "type": "string",
            "format": "date-time",
            "nullable": true
          },
          "plan": {
            "$ref": "#/components/schemas/Plan"
          },
          "billing_profile": {
            "$ref": "#/components/schemas/BillingProfile"
          }
        }
      },
      "BillingProfile": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "example": 1
          },
          "gateway_customer_id": {
            "type": "string",
            "example": "cust_123abc"
          },
          "gateway_type": {
            "type": "string",
            "example": "pagarme"
          },
          "customer": {
            "$ref": "#/components/schemas/Customer"
          },
          "product": {
            "$ref": "#/components/schemas/Product"
          }
        }
      },
      "Invoice": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "example": 1
          },
          "amount_cents": {
            "type": "integer",
            "example": 9900
          },
          "due_date": {
            "type": "string",
            "format": "date"
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "paid",
              "overdue",
              "cancelled"
            ]
          },
          "gateway_invoice_id": {
            "type": "string",
            "example": "inv_123abc"
          },
          "items": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/InvoiceItem"
            }
          }
        }
      },
      "InvoiceItem": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "example": 1
          },
          "description": {
            "type": "string",
            "example": "Plano PMS Pro - Janeiro/2024"
          },
          "amount_cents": {
            "type": "integer",
            "example": 9900
          },
          "quantity": {
            "type": "integer",
            "example": 1
          },
          "product": {
            "$ref": "#/components/schemas/Product"
          }
        }
      },
      "Payment": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "example": 1
          },
          "gateway_payment_id": {
            "type": "string",
            "example": "pay_123abc"
          },
          "amount_cents": {
            "type": "integer",
            "example": 9900
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "processing",
              "paid",
              "failed",
              "refunded"
            ]
          },
          "payment_method": {
            "type": "string",
            "enum": [
              "credit_card",
              "pix",
              "boleto"
            ]
          },
          "processed_at": {
            "type": "string",
            "format": "date-time",
            "nullable": true
          }
        }
      },
      "Error": {
        "type": "object",
        "properties": {
          "error": {
            "type": "string",
            "example": "Validation failed"
          },
          "message": {
            "type": "string",
            "example": "Email is required"
          },
          "details": {
            "type": "object"
          }
        }
      }
    }
  }
}